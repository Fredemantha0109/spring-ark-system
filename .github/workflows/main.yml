name: Spring Ark Scoring System
on:
  repository_dispatch:
    types: [trigger_scoring]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests google-auth google-api-python-client
      - name: Run scoring script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scoring.py
      - name: Calculate daily scores
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python calc_score.py
      - name: Install Surge
        run: npm install -g surge
      - name: Check secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "KEY_LENGTH=${#ANTHROPIC_API_KEY}"
          echo "KEY_PREFIX=${ANTHROPIC_API_KEY:0:10}"
      - name: Generate and deploy dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          SURGE_DOMAIN: spring-ark-dashboard.surge.sh
          GH_PAT: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CALENDAR_CREDENTIALS: ${{ secrets.GOOGLE_CALENDAR_CREDENTIALS }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          JOURNAL_DATABASE_ID: ${{ secrets.JOURNAL_DATABASE_ID }}
          JOURNAL_WEEKLY_DATABASE_ID: ${{ secrets.JOURNAL_WEEKLY_DATABASE_ID }}
          JOURNAL_MONTHLY_DATABASE_ID: ${{ secrets.JOURNAL_MONTHLY_DATABASE_ID }}
          TRAINING_DATABASE_ID: ${{ secrets.TRAINING_DATABASE_ID }}
          TOPIC_CARD_DATABASE_ID: ${{ secrets.TOPIC_CARD_DATABASE_ID }}
          REUSE_LOG_DATABASE_ID: ${{ secrets.REUSE_LOG_DATABASE_ID }}
          # RUN_WEEKLY / RUN_MONTHLY は generate_dashboard.py 側で JST 日付から自動判定する
          # （週次は日曜のみ、月次は1日のみ）。ローカル検証時は環境変数で上書き可能。
        run: python generate_dashboard.py
      - name: Send LINE notification
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SURGE_DOMAIN: spring-ark-dashboard.surge.sh
        run: python send_line.py
