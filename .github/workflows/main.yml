name: Spring Ark Scoring System

on:
  repository_dispatch:
    types: [trigger_scoring]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
     - name: Run scoring script
        env:
          # 右側の名前を、あなたのGitHub Secretsの名前と一致させました
          NOTION_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scoring.py
